name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: "Portfolio verification (7-axis structure/frontmatter/compile/self-test/security/docs/deploy)"
        run: python ci/verify_product.py .
      - name: "Self-tests (legacy discoverable entry)"
        if: always()
        run: |
          for t in $(find . -name "*.py" -not -path "./.git/*" -not -path "./ci/*"); do
            python "$t" self-test 2>/dev/null || true
          done

  deploy-check:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: "Skill package deploy-check"
        run: python ci/ci_check.py
